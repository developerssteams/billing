<div class="modal-backdrop">
  <div class="modal-box" *ngIf="step === 'success' && !isLoading">
    
    <!-- SUCCESS ICON -->
    <div class="success-icon">✓</div>

    <!-- TITLE -->
    <h2>Login Successful</h2>

    <!-- USER -->
    <p class="user">Welcome, {{ userName }}</p>

    <!-- MESSAGE -->
    <p class="msg">You're now ready to manage your business smarter 🚀</p>

    <!-- ACTION BUTTONS -->
    <div class="action-buttons" [class.single-btn]="!isNewUser">
      <ng-container *ngIf="!isNewUser">
        <button class="full-width" (click)="goToDashboard()">Go to Dashboard</button>
      </ng-container>
      
      <ng-container *ngIf="isNewUser">
        <button class="dashboard-btn" (click)="goToDashboard()">Go to Dashboard</button>
        <button class="setup-btn" (click)="startSetup()">Complete Setup</button>
      </ng-container>
    </div>

  </div>

  <div class="modal-box" *ngIf="isLoading">
    <div class="success-icon">⟳</div>
    <h2>Loading...</h2>
    <p class="msg">Please wait while we fetch your details</p>
  </div>

  <!-- STEP 1: COMPANY DETAILS (Single Step) -->
  <div class="modal-box setup-modal" *ngIf="step === 'step1'">
    <div class="setup-header">
      <h2>Complete Your Setup</h2>
      <p>Company Details</p>
      <div class="progress-bar"><div class="progress" style="width: 100%"></div></div>
    </div>

    <div class="setup-form">
      <!-- GSTIN Number with Fetch Details -->
      <div class="form-group full">
        <label>ENTER GSTIN NUMBER</label>
        <div class="gst-input-wrapper">
          <input type="text" [(ngModel)]="companyData.gstin" placeholder="Enter GSTIN Number" maxlength="15" 
                 (input)="checkGST($event)" [disabled]="gstLoading">
          <button type="button" class="fetch-gst-btn" (click)="fetchGstDetailsManually()" [disabled]="!companyData.gstin || companyData.gstin.length !== 15 || gstLoading">
            <i class="iconify" data-icon="mdi:refresh"></i> Fetch Details
          </button>
        </div>
        <small *ngIf="gstLoading" class="fetching-text">Fetching GST details...</small>
        <small *ngIf="gstError" class="error-text">{{ gstError }}</small>
      </div>

      <!-- Company Phone Number with Country Code Dropdown -->
      <div class="form-group full">
        <label>Company Phone Number</label>
        <div class="phone-input-wrapper">
          <div class="country-dropdown">
            <select [(ngModel)]="companyData.countryCode">
              <option value="+91">+91 (India)</option>
              <option value="+1">+1 (USA)</option>
              <option value="+44">+44 (UK)</option>
              <option value="+61">+61 (Australia)</option>
              <option value="+86">+86 (China)</option>
              <option value="+81">+81 (Japan)</option>
              <option value="+49">+49 (Germany)</option>
              <option value="+33">+33 (France)</option>
              <option value="+65">+65 (Singapore)</option>
              <option value="+971">+971 (Dubai)</option>
            </select>
          </div>
          <input type="tel" [(ngModel)]="companyData.phone" placeholder="Company Phone Number" maxlength="15">
        </div>
      </div>

      <!-- Company Email Address -->
      <div class="form-group full">
        <label>Company Email Address</label>
        <input type="email" [(ngModel)]="companyData.email" placeholder="company@example.com">
      </div>

      <!-- Website -->
      <div class="form-group full">
        <label>Website</label>
        <input type="url" [(ngModel)]="companyData.website" placeholder="https://www.example.com">
      </div>

      <!-- PAN Number -->
      <div class="form-group full">
        <label>PAN Number</label>
        <input type="text" [(ngModel)]="companyData.pan" placeholder="ABCDE1234F" maxlength="10" (input)="panToUpperCase($event)">
      </div>

      <!-- Company Address (Line1, Line2) -->
      <div class="form-group full">
        <label>Company Address</label>
        <input type="text" [(ngModel)]="companyData.addressLine1" placeholder="Address Line 1">
        <input type="text" [(ngModel)]="companyData.addressLine2" placeholder="Address Line 2" class="mt-2">
      </div>

      <!-- City + State + Pincode Row -->
      <div class="form-row">
        <div class="form-group third">
          <label>City</label>
          <input type="text" [(ngModel)]="companyData.city" placeholder="City">
        </div>
        <div class="form-group third">
          <label>State</label>
          <input type="text" [(ngModel)]="companyData.state" placeholder="State">
        </div>
        <div class="form-group third">
          <label>Pincode</label>
          <input type="text" [(ngModel)]="companyData.pincode" placeholder="Pincode" maxlength="6">
        </div>
      </div>
    </div>

    <div class="setup-actions">
      <button class="skip-btn" (click)="skipSetup()">Skip Setup →</button>
      <button class="complete-btn" (click)="completeSetup()">Complete Setup →</button>
    </div>
  </div>
</div>
