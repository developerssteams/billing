<div class="modal-backdrop">
  <div class="modal-box" *ngIf="step === 'success' && !isLoading">
    
    <!-- SUCCESS ICON -->
    <div class="success-icon">✓</div>

    <!-- TITLE -->
    <h2>Login Successful</h2>

    <!-- USER -->
    <p class="user">Welcome, {{ userName }}</p>

    <!-- MESSAGE -->
    <p class="msg">You're now ready to manage your business smarter 🚀</p>

    <!-- ACTION BUTTONS -->
    <div class="action-buttons" [class.single-btn]="!isNewUser">
      <ng-container *ngIf="!isNewUser">
        <button class="full-width" (click)="goToDashboard()">Go to Dashboard</button>
      </ng-container>
      
      <ng-container *ngIf="isNewUser">
        <button class="dashboard-btn" (click)="goToDashboard()">Go to Dashboard</button>
        <button class="setup-btn" (click)="startSetup()">Complete Setup</button>
      </ng-container>
    </div>

  </div>

  <!-- Loading State -->
  <div class="modal-box" *ngIf="isLoading">
    <div class="success-icon">⟳</div>
    <h2>Loading...</h2>
    <p class="msg">Please wait while we fetch your details</p>
  </div>

  <!-- 🔥 STEP 1: COMPANY DETAILS (UPDATED) -->
  <div class="modal-box setup-modal" *ngIf="step === 'step1'">
    <div class="setup-header">
      <h2>Complete Your Setup</h2>
      <p>Step 1 of 2 | Company Details</p>
      <div class="progress-bar"><div class="progress" style="width: 50%"></div></div>
    </div>

    <div class="setup-form">
      <!-- Row 1: GSTIN + Company Name -->
      <div class="form-row">
        <div class="form-group half">
          <label>GSTIN Number *</label>
          <input type="text" [(ngModel)]="companyData.gstin" placeholder="Enter GSTIN Number" maxlength="15" 
                 (blur)="fetchGstDetails()" [disabled]="isFetchingGst">
        </div>
        <div class="form-group half">
          <label>Company Name *</label>
          <input type="text" [(ngModel)]="companyData.companyName" placeholder="Enter Company Name">
        </div>
      </div>

      <!-- Row 2: Trade Name + Business Type -->
      <div class="form-row">
        <div class="form-group half">
          <label>Trade Name</label>
          <input type="text" [(ngModel)]="companyData.tradeName" placeholder="Enter Trade Name">
        </div>
        <div class="form-group half">
          <label>Business Type *</label>
          <select [(ngModel)]="companyData.businessType">
            <option value="">Select Business Type</option>
            <option value="Proprietorship">Proprietorship</option>
            <option value="Partnership">Partnership</option>
            <option value="Private Limited">Private Limited</option>
            <option value="Public Limited">Public Limited</option>
            <option value="LLP">LLP</option>
            <option value="Trust">Trust</option>
            <option value="Society">Society</option>
            <option value="Other">Other</option>
          </select>
        </div>
      </div>

      <!-- Row 3: Address (Full Width) -->
      <div class="form-group full">
        <label>Address *</label>
        <textarea rows="2" [(ngModel)]="companyData.address" placeholder="Enter Company Address"></textarea>
      </div>

      <!-- Row 4: City + State + Pincode -->
      <div class="form-row">
        <div class="form-group half">
          <label>City *</label>
          <input type="text" [(ngModel)]="companyData.city" placeholder="Enter City">
        </div>
        <div class="form-group half">
          <label>State *</label>
          <input type="text" [(ngModel)]="companyData.state" placeholder="Enter State">
        </div>
        <div class="form-group half">
          <label>Pincode *</label>
          <input type="text" [(ngModel)]="companyData.pincode" placeholder="Enter Pincode" maxlength="6">
        </div>
      </div>
    </div>

    <div class="setup-actions">
      <button class="skip-btn" (click)="skipSetup()">Skip Setup →</button>
      <button class="next-btn" (click)="nextStep()">Next →</button>
    </div>
  </div>

  <!-- 🔥 STEP 2: OWNER DETAILS (UPDATED) -->
  <div class="modal-box setup-modal" *ngIf="step === 'step2'">
    <div class="setup-header">
      <h2>Complete Your Setup</h2>
      <p>Step 2 of 2 | Owner Details</p>
      <div class="progress-bar"><div class="progress" style="width: 100%"></div></div>
    </div>

    <div class="setup-form">
      <!-- Row 1: User Name (Full Width) -->
      <div class="form-group full">
        <label>User Name *</label>
        <input type="text" [(ngModel)]="ownerData.userName" placeholder="Enter Full Name">
      </div>

      <!-- Row 2: Mobile Number (Full Width) -->
      <div class="form-group full">
        <label>Mobile Number *</label>
        <input type="tel" [(ngModel)]="ownerData.mobile" placeholder="Enter Mobile Number" maxlength="10">
      </div>

      <!-- Row 3: Email (Full Width) -->
      <div class="form-group full">
        <label>Email *</label>
        <input type="email" [(ngModel)]="ownerData.email" placeholder="Enter Email Address">
      </div>

      <!-- Row 4: PAN Card (Full Width) -->
      <div class="form-group full">
        <label>PAN Card</label>
        <input type="text" [(ngModel)]="ownerData.pan" placeholder="Enter PAN Number" maxlength="10">
      </div>

      <!-- Row 5: Website (Full Width) -->
      <div class="form-group full">
        <label>Website</label>
        <input type="text" [(ngModel)]="ownerData.website" placeholder="Enter Website URL (optional)">
      </div>
    </div>

    <div class="setup-actions">
      <button class="skip-btn" (click)="skipSetup()">Skip →</button>
      <button class="complete-btn" (click)="completeSetup()">Complete Setup →</button>
    </div>
  </div>
</div>
