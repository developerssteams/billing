<div class="modal-backdrop">
  <div class="modal-box" *ngIf="step === 'success' && !isLoading">
    <div class="success-icon">✓</div>
    <h2>Login Successful</h2>
    <p class="user">Welcome, {{ userName }}</p>
    <p class="msg">You're now ready to manage your business smarter 🚀</p>

    <div class="action-buttons" [class.single-btn]="!isNewUser">
      <ng-container *ngIf="!isNewUser">
        <button class="full-width" (click)="goToDashboard()">Go to Dashboard</button>
      </ng-container>
      <ng-container *ngIf="isNewUser">
        <button class="dashboard-btn" (click)="goToDashboard()">Go to Dashboard</button>
        <button class="setup-btn" (click)="startSetup()">Complete Setup</button>
      </ng-container>
    </div>
  </div>

  <div class="modal-box" *ngIf="isLoading">
    <div class="success-icon">⟳</div>
    <h2>Loading...</h2>
    <p class="msg">Please wait while we fetch your details</p>
  </div>

  <!-- STEP 1: COMPANY DETAILS -->
  <div class="modal-box setup-modal" *ngIf="step === 'step1'">
    <div class="setup-header">
      <h2>Complete Your Setup</h2>
      <p>Step 1 of 2 | Company Details</p>
      <div class="progress-bar"><div class="progress" style="width: 50%"></div></div>
    </div>

    <div class="setup-form">
      <!-- Row 1: GSTIN + Company Name -->
      <div class="form-row">
        <div class="form-group half">
          <label>GSTIN Number *</label>
          <div class="gst-input-wrapper">
            <input type="text" [(ngModel)]="companyData.gstin" placeholder="Enter GSTIN Number" maxlength="15" 
                   (input)="checkGST($event)" [disabled]="isFetchingGst">
            <button class="fetch-gst-btn" (click)="fetchGstDetails()" [disabled]="!companyData.gstin || companyData.gstin.length !== 15 || isFetchingGst">
              <span *ngIf="!isFetchingGst">🔍</span>
              <span *ngIf="isFetchingGst">⏳</span>
            </button>
          </div>
          <small *ngIf="isFetchingGst" class="fetching-text">Fetching GST details...</small>
          <small *ngIf="gstError" class="error-text">{{ gstError }}</small>
        </div>
        <div class="form-group half">
          <label>Company Name *</label>
          <input type="text" [(ngModel)]="companyData.company_name" placeholder="Enter Company Name">
        </div>
      </div>

      <!-- Row 2: Trade Name + Business Type -->
      <div class="form-row">
        <div class="form-group half">
          <label>Trade Name</label>
          <input type="text" [(ngModel)]="companyData.trade_name" placeholder="Enter Trade Name">
        </div>
        <div class="form-group half">
          <label>Business Type *</label>
          <input type="text" [(ngModel)]="companyData.business_type" placeholder="Auto-fills from GST">
        </div>
      </div>

      <!-- Row 3: Address -->
      <div class="form-group full">
        <label>Address *</label>
        <textarea rows="2" [(ngModel)]="companyData.address" placeholder="Enter Company Address"></textarea>
      </div>

      <!-- Row 4: City + State + Pincode -->
      <div class="form-row">
        <div class="form-group third">
          <label>City *</label>
          <input type="text" [(ngModel)]="companyData.city" placeholder="City">
        </div>
        <div class="form-group third">
          <label>State *</label>
          <input type="text" [(ngModel)]="companyData.state" placeholder="State">
        </div>
        <div class="form-group third">
          <label>Pincode *</label>
          <input type="text" [(ngModel)]="companyData.pincode" placeholder="Pincode" maxlength="6">
        </div>
      </div>
    </div>

    <div class="setup-actions">
      <button class="skip-btn" (click)="skipSetup()">Skip Setup →</button>
      <button class="next-btn" (click)="nextStep()">Next →</button>
    </div>
  </div>

  <!-- STEP 2: CONTACT & PAN DETAILS -->
  <div class="modal-box setup-modal" *ngIf="step === 'step2'">
    <div class="setup-header">
      <h2>Complete Your Setup</h2>
      <p>Step 2 of 2 | Contact Details</p>
      <div class="progress-bar"><div class="progress" style="width: 100%"></div></div>
    </div>

    <div class="setup-form">
      <!-- Row 1: Phone + Email -->
      <div class="form-row">
        <div class="form-group half">
          <label>Phone Number *</label>
          <div class="phone-input-wrapper">
            <div class="country-dropdown">
              <select [(ngModel)]="companyData.countryCode">
                <option value="+91">+91 (India)</option>
                <option value="+1">+1 (USA)</option>
                <option value="+44">+44 (UK)</option>
                <option value="+61">+61 (Australia)</option>
              </select>
            </div>
            <input type="tel" [(ngModel)]="companyData.phone" placeholder="Phone Number" maxlength="15">
          </div>
        </div>
        <div class="form-group half">
          <label>Email Address *</label>
          <input type="email" [(ngModel)]="companyData.email" placeholder="Email Address">
        </div>
      </div>

      <!-- Row 2: PAN + Website -->
      <div class="form-row">
        <div class="form-group half">
          <label>PAN Number *</label>
          <input type="text" [(ngModel)]="companyData.pan" placeholder="ABCDE1234F" maxlength="10" (input)="panToUpperCase($event)">
        </div>
        <div class="form-group half">
          <label>Website</label>
          <input type="url" [(ngModel)]="companyData.website" placeholder="https://example.com">
        </div>
      </div>
    </div>

    <div class="setup-actions">
      <button class="back-btn" (click)="prevStep()">← Back</button>
      <button class="skip-btn" (click)="skipSetup()">Skip →</button>
      <button class="complete-btn" (click)="completeSetup()">Complete Setup →</button>
    </div>
  </div>
</div>
