<div class="modal-backdrop">
  <div class="modal-box" *ngIf="step === 'success' && !isLoading">
    
    <!-- SUCCESS ICON -->
    <div class="success-icon">✓</div>

    <!-- TITLE -->
    <h2>Login Successful</h2>

    <!-- USER -->
    <p class="user">Welcome, {{ userName }}</p>

    <!-- MESSAGE -->
    <p class="msg">You're now ready to manage your business smarter 🚀</p>

    <!-- ACTION BUTTONS -->
    <div class="action-buttons" [class.single-btn]="!isNewUser">
      <ng-container *ngIf="!isNewUser">
        <button class="full-width" (click)="goToDashboard()">Go to Dashboard</button>
      </ng-container>
      
      <ng-container *ngIf="isNewUser">
        <button class="dashboard-btn" (click)="goToDashboard()">Go to Dashboard</button>
        <button class="setup-btn" (click)="startSetup()">Complete Setup</button>
      </ng-container>
    </div>

  </div>
<!-- Loading State -->
<div class="modal-box" *ngIf="isLoading">

  <div class="success-icon">⟳</div>

  <h2>Loading...</h2>

  <p class="msg">
    Please wait while we fetch your details
  </p>

</div>

<!-- STEP 1 -->
<div class="modal-box setup-modal" *ngIf="step === 'step1'">

  <div class="setup-header">

    <h2>Complete Your Setup</h2>

    <p>Step 1 of 2 | Company Details</p>

    <div class="progress-bar">
      <div class="progress" style="width: 50%"></div>
    </div>

  </div>

  <div class="setup-form">

    <!-- GSTIN + COMPANY NAME -->
    <div class="form-row">

      <div class="form-group half">

        <label>GSTIN Number *</label>

        <div class="gst-input-wrapper">

          <input
            type="text"
            [(ngModel)]="companyData.gstin"
            placeholder="Enter GSTIN Number"
            maxlength="15"
            (input)="checkGST($event)"
          >

          <button
            type="button"
            class="fetch-gst-btn"
            (click)="fetchGstDetailsManually()"
          >

            <span *ngIf="!gstLoading">🔍</span>

            <span *ngIf="gstLoading">⏳</span>

          </button>

        </div>

        <small class="fetching-text" *ngIf="gstLoading">
          Fetching GST details...
        </small>

        <small class="error-text" *ngIf="gstError">
          {{ gstError }}
        </small>

      </div>

      <div class="form-group half">

        <label>Company Name *</label>

        <input
          type="text"
          [(ngModel)]="companyData.companyName"
          placeholder="Enter Company Name"
        >

      </div>

    </div>

    <!-- TRADE NAME + BUSINESS TYPE -->
    <div class="form-row">

      <div class="form-group half">

        <label>Trade Name</label>

        <input
          type="text"
          [(ngModel)]="companyData.tradeName"
          placeholder="Enter Trade Name"
        >

      </div>

      <div class="form-group half">

        <label>Business Type *</label>

        <input
          type="text"
          [(ngModel)]="companyData.businessType"
          placeholder="Enter Business Type"
        >

      </div>

    </div>

    <!-- ADDRESS -->
    <div class="form-group full">

      <label>Address *</label>

      <textarea
        rows="3"
        [(ngModel)]="companyData.addressLine1"
        placeholder="Enter Company Address"
      ></textarea>

    </div>

    <!-- CITY STATE PINCODE -->
    <div class="form-row">

      <div class="form-group third">

        <label>City *</label>

        <input
          type="text"
          [(ngModel)]="companyData.city"
          placeholder="City"
        >

      </div>

      <div class="form-group third">

        <label>State *</label>

        <input
          type="text"
          [(ngModel)]="companyData.state"
          placeholder="State"
        >

      </div>

      <div class="form-group third">

        <label>Pincode *</label>

        <input
          type="text"
          [(ngModel)]="companyData.pincode"
          placeholder="Pincode"
        >

      </div>

    </div>

  </div>

  <div class="setup-actions">

    <button
      class="skip-btn"
      (click)="skipSetup()"
    >
      Skip →
    </button>

    <button
      class="next-btn"
      (click)="nextStep()"
    >
      Next →
    </button>

  </div>

</div>

<!-- STEP 2 -->
<div class="modal-box setup-modal" *ngIf="step === 'step2'">

  <div class="setup-header">

    <h2>Complete Your Setup</h2>

    <p>Step 2 of 2 | User Details</p>

    <div class="progress-bar">
      <div class="progress" style="width: 100%"></div>
    </div>

  </div>

  <div class="setup-form">

    <!-- USER NAME -->
    <div class="form-group full">

      <label>User Name *</label>

      <input
        type="text"
        [(ngModel)]="userData.userName"
        placeholder="Enter User Name"
      >

    </div>

    <!-- PHONE -->
    <div class="form-group full">

      <label>Phone Number *</label>

      <div class="phone-input-wrapper">

        <div class="country-dropdown">

          <select [(ngModel)]="userData.countryCode">

            <option value="+91">🇮🇳 +91</option>

            <option value="+1">🇺🇸 +1</option>

            <option value="+44">🇬🇧 +44</option>

          </select>

        </div>

        <input
          type="tel"
          [(ngModel)]="userData.mobile"
          placeholder="Enter Mobile Number"
        >

      </div>

    </div>

    <!-- EMAIL -->
    <div class="form-group full">

      <label>Email Address *</label>

      <input
        type="email"
        [(ngModel)]="userData.email"
        placeholder="Enter Email Address"
      >

    </div>

    <!-- PAN -->
    <div class="form-group full">

      <label>PAN Number *</label>

      <input
        type="text"
        maxlength="10"
        [(ngModel)]="userData.pan"
        placeholder="Enter PAN Number"
        (input)="panToUpperCase($event)"
      >

    </div>

    <!-- WEBSITE -->
    <div class="form-group full">

      <label>Website</label>

      <input
        type="text"
        [(ngModel)]="userData.website"
        placeholder="www.yourdomain.com"
      >

    </div>

  </div>

  <div class="setup-actions">

    <button
      class="back-btn"
      (click)="prevStep()"
    >
      ← Back
    </button>

    <button
      class="complete-btn"
      (click)="completeSetup()"
    >
      Complete Setup →
    </button>

  </div>

</div>
