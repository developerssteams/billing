<div class="modal-backdrop">
  <div class="modal-box" *ngIf="step === 'success' && !isLoading">

    <!-- SUCCESS ICON -->
    <div class="success-icon">✓</div>

    <!-- TITLE -->
    <h2>Login Successful</h2>

    <!-- USER -->
    <p class="user">Welcome, {{ userName }}</p>

    <!-- MESSAGE -->
    <p class="msg">You're now ready to manage your business smarter 🚀</p>

    <!-- ACTION BUTTONS -->
    <div class="action-buttons" [class.single-btn]="!isNewUser">
      <ng-container *ngIf="!isNewUser">
        <button class="full-width" (click)="goToDashboard()">Go to Dashboard</button>
      </ng-container>

      <ng-container *ngIf="isNewUser">
        <button class="dashboard-btn" (click)="goToDashboard()">Go to Dashboard</button>
        <button class="setup-btn" (click)="startSetup()">Complete Setup</button>
      </ng-container>
    </div>

  </div>

  <!-- Loading State -->
  <div class="modal-box" *ngIf="isLoading">
    <div class="success-icon">⟳</div>
    <h2>Loading...</h2>
    <p class="msg">Please wait while we fetch your details</p>
  </div>

  <!-- STEP 1: COMPANY DETAILS -->
  <!-- STEP 1 -->
  <div class="modal-box setup-modal" *ngIf="step === 'step1'">

    <div class="setup-header">
      <h2>Complete Your Setup</h2>
      <p>Step 1 of 2 | Company Details</p>

      <div class="progress-bar">
        <div class="progress" style="width: 50%"></div>
      </div>
    </div>

    <div class="setup-form">

      <!-- GSTIN + COMPANY -->
      <div class="form-row">

        <div class="form-group half">
          <label>GSTIN Number *</label>

          <div class="gst-input-wrapper">

            <input type="text" [(ngModel)]="companyData.gstin" placeholder="Enter GSTIN Number" maxlength="15">

            <button class="fetch-gst-btn" (click)="fetchGstDetails()">
           G
            </button>

          </div>
        </div>

        <div class="form-group half">
          <label>Company Name *</label>

          <input type="text" [(ngModel)]="companyData.companyName" placeholder="Enter Company Name">
        </div>

      </div>

      <!-- TRADE NAME + BUSINESS TYPE -->
      <div class="form-row">

        <div class="form-group half">
          <label>Trade Name</label>

          <input type="text" [(ngModel)]="companyData.tradeName" placeholder="Enter Trade Name">
        </div>

        <div class="form-group half">
          <label>Business Type</label>

          <input type="text" [(ngModel)]="companyData.businessType" placeholder="Enter Business Type">
        </div>

      </div>

      <!-- ADDRESS -->
      <div class="form-group full">

        <label>Address *</label>

        <textarea rows="3" [(ngModel)]="companyData.address" placeholder="Enter Address"></textarea>

      </div>

      <!-- CITY STATE PINCODE -->
      <div class="form-row">

        <div class="form-group third">
          <label>City</label>

          <input type="text" [(ngModel)]="companyData.city" placeholder="City">
        </div>

        <div class="form-group third">
          <label>State</label>

          <input type="text" [(ngModel)]="companyData.state" placeholder="State">
        </div>

        <div class="form-group third">
          <label>Pincode</label>

          <input type="text" [(ngModel)]="companyData.pincode" placeholder="Pincode">
        </div>

      </div>

    </div>

    <div class="setup-actions">
      <button class="skip-btn" (click)="skipSetup()">
        Skip
      </button>

      <button class="next-btn" (click)="nextStep()">
        Next →
      </button>
    </div>

  </div>

  <!-- STEP 2: OWNER DETAILS -->
  <!-- STEP 2 -->
  <div class="modal-box setup-modal" *ngIf="step === 'step2'">

    <div class="setup-header">
      <h2>Complete Your Setup</h2>

      <p>Step 2 of 2 | Contact Details</p>

      <div class="progress-bar">
        <div class="progress" style="width: 100%"></div>
      </div>
    </div>

    <div class="setup-form">

      <!-- PHONE -->
      <div class="form-group full">
        <label>Phone Number *</label>

        <input type="text" [(ngModel)]="ownerData.mobile" placeholder="Enter Phone Number">
      </div>

      <!-- EMAIL -->
      <div class="form-group full">
        <label>Email ID *</label>

        <input type="email" [(ngModel)]="ownerData.email" placeholder="Enter Email ID">
      </div>

      <!-- PAN -->
      <div class="form-group full">
        <label>PAN Number</label>

        <input type="text" [(ngModel)]="ownerData.panNumber" placeholder="Enter PAN Number">
      </div>

      <!-- WEBSITE -->
      <div class="form-group full">
        <label>Website</label>

        <input type="text" [(ngModel)]="ownerData.website" placeholder="Enter Website">
      </div>

    </div>

    <div class="setup-actions">

      <button class="back-btn" (click)="step='step1'">
        ← Back
      </button>

      <button class="complete-btn" (click)="completeSetup()">
        Complete Setup →
      </button>

    </div>

  </div>
</div>
