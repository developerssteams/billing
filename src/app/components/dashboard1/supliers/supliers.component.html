<mat-card class="p-4 hover:shadow-lg transition-shadow">
  <div class="flex items-center justify-between mb-3">
    <div>
      <p class="text-gray-500 text-sm mb-1">Total Suppliers</p>
      <h3 class="text-2xl font-bold text-indigo-600">{{ value | number }}</h3>
      <p class="text-green-500 text-xs mt-1">
        <i-tabler name="truck" class="w-3 h-3 inline"></i-tabler>
        +{{ newSuppliers }} new this month
      </p>
    </div>
    <div class="bg-indigo-100 p-3 rounded-full">
      <i-tabler name="building-warehouse" class="w-6 h-6 text-indigo-600"></i-tabler>
    </div>
  </div>
  
  <div class="mt-3">
    <div class="flex justify-between text-xs mb-1">
      <span class="text-gray-500">Active Suppliers</span>
      <span class="text-indigo-600 font-semibold">{{ (activeSuppliers / value * 100) | number:'1.0-0' }}%</span>
    </div>
    <div class="w-full bg-gray-200 rounded-full h-1.5">
      <div class="bg-indigo-500 h-1.5 rounded-full" [style.width.%]="(activeSuppliers / value * 100)"></div>
    </div>
  </div>
  
  <div class="mt-3 flex justify-between items-center">
    <div>
      <p class="text-xs text-gray-500">Active Now</p>
      <p class="text-sm font-semibold text-gray-700">{{ activeSuppliers | number }}</p>
    </div>
    <div class="text-right">
      <p class="text-xs text-gray-500">Total Spent</p>
      <p class="text-sm font-semibold text-gray-700">${{ totalSpent | number }}</p>
    </div>
  </div>
  
  <div class="mt-3 flex justify-between items-center">
    <div>
      <p class="text-xs text-gray-500">Avg. Rating</p>
      <div class="flex items-center gap-1">
        <span class="text-sm font-semibold text-yellow-500">{{ averageRating }}</span>
        <i-tabler name="star" class="w-4 h-4 text-yellow-500 fill-current"></i-tabler>
      </div>
    </div>
    <div class="text-right">
      <p class="text-xs text-gray-500">Purchase Orders</p>
      <p class="text-sm font-semibold text-gray-700">156</p>
    </div>
  </div>
  
  <div class="mt-3 pt-2 border-t border-gray-100">
    <button class="w-full text-indigo-600 text-sm font-medium hover:text-indigo-700 transition flex items-center justify-center gap-1">
      <i-tabler name="list" class="w-4 h-4"></i-tabler>
      Manage Suppliers
    </button>
  </div>
</mat-card>
