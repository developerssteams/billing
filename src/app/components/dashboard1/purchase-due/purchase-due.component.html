<mat-card class="p-4">
  <div class="flex items-center justify-between mb-4">
    <h3 class="text-lg font-semibold">Purchase Due</h3>
    <i class="iconify text-2xl" data-icon="solar:box-line-duotone"></i>
  </div>
  <div class="text-center">
    <div class="text-3xl font-bold text-red-600">${{ purchaseAmount }}</div>
    <p class="text-gray-500 mt-2">Due by {{ dueDate }}</p>
    <div class="mt-4 w-full bg-gray-200 rounded-full h-2">
      <div class="bg-red-500 h-2 rounded-full" [style.width.%]="progressPercentage"></div>
    </div>
    <button class="mt-4 bg-blue-500 text-white px-4 py-2 rounded-md hover:bg-blue-600 transition">
      Pay Now
    </button>
  </div>
</mat-card>
