<mat-card class="p-4 hover:shadow-lg transition-shadow">
  <div class="flex items-center justify-between mb-3">
    <div>
      <p class="text-gray-500 text-sm mb-1">Total Expense</p>
      <h3 class="text-2xl font-bold text-red-600">${{ value | number }}</h3>
      <p class="text-red-500 text-xs mt-1">
        <i-tabler name="trending-up" class="w-3 h-3 inline"></i-tabler>
        +{{ growth }}% from last month
      </p>
    </div>
    <div class="bg-red-100 p-3 rounded-full">
      <i-tabler name="credit-card" class="w-6 h-6 text-red-600"></i-tabler>
    </div>
  </div>

  
  <div class="mt-3 pt-2 border-t border-gray-100">
    <button class="w-full text-red-600 text-sm font-medium hover:text-red-700 transition flex items-center justify-center gap-1">
      <i-tabler name="chart-bar" class="w-4 h-4"></i-tabler>
      View Breakdown
    </button>
  </div>
</mat-card>
