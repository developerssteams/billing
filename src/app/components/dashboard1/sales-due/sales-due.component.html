<mat-card class="p-4 hover:shadow-lg transition-shadow">
  <div class="flex items-center justify-between mb-3">
    <div>
      <p class="text-gray-500 text-sm mb-1">Sales Due</p>
      <h3 class="text-2xl font-bold text-orange-600">${{ value | number }}</h3>
    </div>
    <div class="bg-orange-100 p-3 rounded-full">
      <i-tabler name="receipt" class="w-6 h-6 text-orange-600"></i-tabler>
    </div>
  </div>
  
  <div class="mt-3">
    <div class="flex justify-between text-xs mb-1">
      <span class="text-gray-500">Due Amount</span>
      <span class="text-orange-600 font-semibold">{{ percentage }}%</span>
    </div>
    <div class="w-full bg-gray-200 rounded-full h-1.5">
      <div class="bg-orange-500 h-1.5 rounded-full" [style.width.%]="percentage"></div>
    </div>
  </div>
  
  <div class="mt-3 flex justify-between items-center">
    <div>
      <p class="text-xs text-gray-500">Due Days</p>
      <p class="text-sm font-semibold text-orange-600">{{ dueDays }} days</p>
    </div>
    <div class="text-right">
      <p class="text-xs text-gray-500">Pending Invoices</p>
      <p class="text-sm font-semibold text-gray-700">{{ dueCount }}</p>
    </div>
  </div>
  
  <div class="mt-3 pt-2 border-t border-gray-100">
    <button class="w-full text-orange-600 text-sm font-medium hover:text-orange-700 transition flex items-center justify-center gap-1">
      <i-tabler name="eye" class="w-4 h-4"></i-tabler>
      View Details
    </button>
  </div>
</mat-card>
